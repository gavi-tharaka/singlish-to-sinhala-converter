<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singlish to Sinhala Unicode Converter - Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
        }
        h2 { color: #2196f3; margin-top: 0; }
        .badge {
            display: inline-block;
            padding: 5px 10px;
            background-color: #ff9800;
            color: #000;
            font-weight: bold;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .badge.sinhala { background-color: #4caf50; color: #fff; }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px 0;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            border-color: #2196f3;
            outline: none;
        }
        kbd {
            background-color: #444;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Singlish Unicode Converter</h2>
    <p>Press <kbd>Ctrl</kbd> + <kbd>Space</kbd> to change typing mode.</p>
    
    <div id="statusBadge" class="badge sinhala">Mode: Sinhala</div>

    <label>Name (Input Field):</label>
    <input type="text" placeholder="Type here (e.g., oyata kohomada)...">

    <label>Message (Textarea):</label>
    <textarea rows="4" placeholder="Type long paragraph here..."></textarea>
</div>

<script src="singlish.js"></script>

<script>
    // Optional: UI enhancement to show active mode on screen
    document.addEventListener('singlishModeChange', (e) => {
        const badge = document.getElementById('statusBadge');
        if(e.detail.isSinhala) {
            badge.innerText = "Mode: Sinhala";
            badge.className = "badge sinhala";
        } else {
            badge.innerText = "Mode: English";
            badge.className = "badge";
        }
    });
</script>

</body>
</html>
